name: CI

on:
  push:
    branches: [main, ci/cd-workflow]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '22'

jobs:
  backend:
    name: Backend - Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore be/AutoGrading.sln

      - name: Build
        run: dotnet build be/AutoGrading.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test be/AutoGrading.sln --configuration Release --no-build --verbosity normal

  frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [admin-web, user-web]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          cd fe/${{ matrix.app }}
          npm ci

      - name: Build
        run: |
          cd fe/${{ matrix.app }}
          npm run build

  docker-build:
    name: Docker - Build Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build BE images
        run: |
          for svc in Catalog Grading Identity Notification Submission; do
            docker build -t autograding-$svc -f be/src/Services/$svc/AutoGrading.$svc.Api/Dockerfile .
          done

      - name: Build Gateway
        run: docker build -t autograding-gateway -f be/src/Gateway/AutoGrading.Gateway/Dockerfile .

      - name: Build FE images
        run: |
          docker build -t autograding-admin-web -f fe/admin-web/Dockerfile fe/admin-web
          docker build -t autograding-user-web -f fe/user-web/Dockerfile fe/user-web
