services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [autograding-net]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [autograding-net]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks: [autograding-net]

  identity-api:
    build:
      context: .
      dockerfile: be/src/Services/Identity/AutoGrading.Identity.Api/Dockerfile
    environment:
      ConnectionStrings__IdentityDb: Server=sqlserver,1433;Database=AutoGrading.Identity;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__ExpiryMinutes: "60"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__UserName: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      RabbitMq__Exchange: autograding.events
      RabbitMq__ServiceName: identity
      GoogleAuth__ClientId: ${GOOGLE_CLIENT_ID}
    ports:
      - "5001:8080"
    depends_on:
      sqlserver: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [autograding-net]

  catalog-api:
    build:
      context: .
      dockerfile: be/src/Services/Catalog/AutoGrading.Catalog.Api/Dockerfile
    environment:
      ConnectionStrings__CatalogDb: Server=sqlserver,1433;Database=AutoGrading.Catalog;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__ExpiryMinutes: "60"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__UserName: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      RabbitMq__Exchange: autograding.events
      RabbitMq__ServiceName: catalog
      Minio__Endpoint: minio:9000
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Minio__UseSsl: "false"
      Minio__BucketName: autograding
    ports:
      - "5002:8080"
    depends_on:
      sqlserver: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      minio: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [autograding-net]

  submission-api:
    build:
      context: .
      dockerfile: be/src/Services/Submission/AutoGrading.Submission.Api/Dockerfile
    environment:
      ConnectionStrings__SubmissionDb: Server=sqlserver,1433;Database=AutoGrading.Submission;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__ExpiryMinutes: "60"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__UserName: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      RabbitMq__Exchange: autograding.events
      RabbitMq__ServiceName: submission
      Minio__Endpoint: minio:9000
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Minio__UseSsl: "false"
      Minio__BucketName: autograding
    ports:
      - "5003:8080"
    depends_on:
      sqlserver: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      minio: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [autograding-net]

  grading-api:
    build:
      context: .
      dockerfile: be/src/Services/Grading/AutoGrading.Grading.Api/Dockerfile
    environment:
      ConnectionStrings__GradingDb: Server=sqlserver,1433;Database=AutoGrading.Grading;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__ExpiryMinutes: "60"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__UserName: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      RabbitMq__Exchange: autograding.events
      RabbitMq__ServiceName: grading
      OpenRouter__ApiKey: ${OPENROUTER_API_KEY}
      OpenRouter__Model: deepseek/deepseek-chat
      OpenRouter__BaseUrl: https://openrouter.ai/api/v1
    ports:
      - "5004:8080"
    depends_on:
      sqlserver: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [autograding-net]

  notification-api:
    build:
      context: .
      dockerfile: be/src/Services/Notification/AutoGrading.Notification.Api/Dockerfile
    environment:
      ConnectionStrings__NotificationDb: Server=sqlserver,1433;Database=AutoGrading.Notification;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__ExpiryMinutes: "60"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__UserName: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      RabbitMq__Exchange: autograding.events
      RabbitMq__ServiceName: notification
    ports:
      - "5005:8080"
    depends_on:
      sqlserver: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [autograding-net]

  gateway:
    build:
      context: .
      dockerfile: be/src/Gateway/AutoGrading.Gateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__ExpiryMinutes: "60"
      Cors__AllowedOrigins__0: http://localhost:5173
      Cors__AllowedOrigins__1: http://localhost:5174
    ports:
      - "5500:8080"
    depends_on:
      identity-api: { condition: service_healthy }
      catalog-api: { condition: service_healthy }
      submission-api: { condition: service_healthy }
      grading-api: { condition: service_healthy }
      notification-api: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [autograding-net]

  user-web:
    build:
      context: .
      dockerfile: fe/user-web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5500
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    ports:
      - "5173:80"
    depends_on:
      gateway: { condition: service_healthy }
    networks: [autograding-net]

  admin-web:
    build:
      context: .
      dockerfile: fe/admin-web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5500
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    ports:
      - "5174:80"
    depends_on:
      gateway: { condition: service_healthy }
    networks: [autograding-net]

networks:
  autograding-net:

volumes:
  sqlserver_data:
  rabbitmq_data:
  minio_data:
