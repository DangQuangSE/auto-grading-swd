services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autograding
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SA_PASSWORD:-AutoGrading_2026#}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autograding"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [autograding-net]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [autograding-net]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks: [autograding-net]

  identity-api:
    build:
      context: .
      dockerfile: be/src/Services/Identity/AutoGrading.Identity.Api/Dockerfile
    environment:
      ConnectionStrings__IdentityDb: Host=postgres;Port=5432;Database=autograding;Username=postgres;Password=${SA_PASSWORD};IncludeErrorDetail=True;
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__ExpiryMinutes: "60"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__UserName: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      RabbitMq__Exchange: autograding.events
      RabbitMq__ServiceName: identity
      GoogleAuth__ClientId: ${GOOGLE_CLIENT_ID}
      Seed__TestAccounts: "true"
    ports:
      - "5001:8080"
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [autograding-net]

  catalog-api:
    build:
      context: .
      dockerfile: be/src/Services/Catalog/AutoGrading.Catalog.Api/Dockerfile
    environment:
      ConnectionStrings__CatalogDb: Host=postgres;Port=5432;Database=autograding;Username=postgres;Password=${SA_PASSWORD};IncludeErrorDetail=True;
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__ExpiryMinutes: "60"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__UserName: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      RabbitMq__Exchange: autograding.events
      RabbitMq__ServiceName: catalog
      Minio__Endpoint: minio:9000
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Minio__UseSsl: "false"
      Minio__BucketName: autograding
      OpenCode__ApiKey: ${OPENCODE_API_KEY}
      OpenCode__Model: mimo-v2.5-free
      OpenCode__BaseUrl: https://opencode.ai/zen/v1
    ports:
      - "5002:8080"
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      minio: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [autograding-net]

  submission-api:
    build:
      context: .
      dockerfile: be/src/Services/Submission/AutoGrading.Submission.Api/Dockerfile
    environment:
      ConnectionStrings__SubmissionDb: Host=postgres;Port=5432;Database=autograding;Username=postgres;Password=${SA_PASSWORD};IncludeErrorDetail=True;
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__ExpiryMinutes: "60"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__UserName: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      RabbitMq__Exchange: autograding.events
      RabbitMq__ServiceName: submission
      Minio__Endpoint: minio:9000
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Minio__UseSsl: "false"
      Minio__BucketName: autograding
    ports:
      - "5003:8080"
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      minio: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [autograding-net]

  grading-api:
    build:
      context: .
      dockerfile: be/src/Services/Grading/AutoGrading.Grading.Api/Dockerfile
    environment:
      ConnectionStrings__GradingDb: Host=postgres;Port=5432;Database=autograding;Username=postgres;Password=${SA_PASSWORD};IncludeErrorDetail=True;
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__ExpiryMinutes: "60"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__UserName: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      RabbitMq__Exchange: autograding.events
      RabbitMq__ServiceName: grading
      OpenCode__ApiKey: ${OPENCODE_API_KEY}
      OpenCode__Model: mimo-v2.5-free
      OpenCode__BaseUrl: https://opencode.ai/zen/v1
      Services__CatalogApiBaseUrl: http://catalog-api:8080
      Services__SubmissionApiBaseUrl: http://submission-api:8080
    ports:
      - "5004:8080"
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      catalog-api: { condition: service_healthy }
      submission-api: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [autograding-net]

  notification-api:
    build:
      context: .
      dockerfile: be/src/Services/Notification/AutoGrading.Notification.Api/Dockerfile
    environment:
      ConnectionStrings__NotificationDb: Host=postgres;Port=5432;Database=autograding;Username=postgres;Password=${SA_PASSWORD};IncludeErrorDetail=True;
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__ExpiryMinutes: "60"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__UserName: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      RabbitMq__Exchange: autograding.events
      RabbitMq__ServiceName: notification
    ports:
      - "5005:8080"
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [autograding-net]

  gateway:
    build:
      context: .
      dockerfile: be/src/Gateway/AutoGrading.Gateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__ExpiryMinutes: "60"
      Cors__AllowedOrigins__0: http://localhost:5173
      Cors__AllowedOrigins__1: http://localhost:5174
    ports:
      - "5500:8080"
    depends_on:
      identity-api: { condition: service_healthy }
      catalog-api: { condition: service_healthy }
      submission-api: { condition: service_healthy }
      grading-api: { condition: service_healthy }
      notification-api: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [autograding-net]

  user-web:
    build:
      context: .
      dockerfile: fe/user-web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5500
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        VITE_ADMIN_WEB_URL: http://localhost:5174
    ports:
      - "5173:80"
    depends_on:
      gateway: { condition: service_healthy }
    networks: [autograding-net]

  admin-web:
    build:
      context: .
      dockerfile: fe/admin-web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5500
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    ports:
      - "5174:80"
    depends_on:
      gateway: { condition: service_healthy }
    networks: [autograding-net]

networks:
  autograding-net:

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
